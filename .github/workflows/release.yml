name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crea Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HUB Tool AIO ${{ github.ref_name }}"
          files: "HUB Tool - All-in-one.pyw"
          generate_release_notes: true
